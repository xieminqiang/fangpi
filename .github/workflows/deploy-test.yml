name: Deploy Test

on:
  push:
    branches:
      - test

concurrency:
  group: deploy-test
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy to test server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: server/go.sum

      - name: Build frontend
        run: npm install && npm run build
        working-directory: web

      - name: Build backend
        run: |
          go mod tidy
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o server .
        working-directory: server

      - name: Setup SSH key
        env:
          KEY_B64: ${{ secrets.KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          KEY_CLEAN="$(printf '%s' "$KEY_B64" | tr -d '\r\t')"
          if echo "$KEY_CLEAN" | grep -q 'BEGIN OPENSSH PRIVATE KEY'; then
            printf '%s\n' "$KEY_CLEAN" | sed 's/\r$//' > ~/.ssh/deploy_key
          else
            printf '%s' "$KEY_CLEAN" | tr -d ' \n' | openssl base64 -d -A > ~/.ssh/deploy_key
          fi
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/deploy_key

      - name: Deploy via SSH
        env:
          SSH_HOST: ${{ secrets.HOST }}
          SSH_USER: ${{ secrets.USER }}
          SSH_PORT: ${{ secrets.PROT }}
          DEPLOY_DIR: ${{ secrets.MKDIRTEST }}
        run: |
          set -euo pipefail

          case "$DEPLOY_DIR" in
            */) ;;
            *) DEPLOY_DIR="${DEPLOY_DIR}/" ;;
          esac

          mkdir -p ~/.ssh
          ssh-keyscan -H -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          REMOTE="${SSH_USER}@${SSH_HOST}"

          ssh -p "$SSH_PORT" "$REMOTE" "mkdir -p ${DEPLOY_DIR}dist ${DEPLOY_DIR}resource"
          scp -P "$SSH_PORT" -r web/dist/. "${REMOTE}:${DEPLOY_DIR}dist/"
          scp -P "$SSH_PORT" server/server "${REMOTE}:${DEPLOY_DIR}server"
          scp -P "$SSH_PORT" -r server/resource/. "${REMOTE}:${DEPLOY_DIR}resource/"
          scp -P "$SSH_PORT" deploy/scripts/restart.sh "${REMOTE}:${DEPLOY_DIR}restart.sh"
          ssh -p "$SSH_PORT" "$REMOTE" "chmod +x ${DEPLOY_DIR}restart.sh ${DEPLOY_DIR}server && cd ${DEPLOY_DIR} && bash restart.sh"
