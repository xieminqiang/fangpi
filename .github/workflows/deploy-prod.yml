name: Deploy Prod

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-prod
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy to production server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: server/go.sum

      - name: Build frontend
        run: npm install && npm run build
        working-directory: web

      - name: Build backend
        run: |
          go mod tidy
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o server .
        working-directory: server

      - name: Verify build artifacts
        run: |
          test -d web/dist
          test -f web/dist/index.html
          test -f server/server
          test -d server/resource
          file server/server

      - name: Deploy via SSH
        env:
          SSH_KEY: ${{ secrets.KEY }}
          SSH_HOST: ${{ secrets.HOST }}
          SSH_USER: ${{ secrets.USER }}
          SSH_PORT: ${{ secrets.PROT }}
          DEPLOY_DIR: ${{ secrets.MKDIR }}
        run: |
          set -euo pipefail

          for name in SSH_KEY SSH_HOST SSH_USER SSH_PORT DEPLOY_DIR; do
            if [ -z "${!name:-}" ]; then
              echo "error: GitHub Secret ${name#SSH_} is empty"
              exit 1
            fi
          done

          case "$DEPLOY_DIR" in
            */) ;;
            *) DEPLOY_DIR="${DEPLOY_DIR}/" ;;
          esac

          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          sed -i 's/\r$//' ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          SSH_OPTS=(-p "$SSH_PORT" -o StrictHostKeyChecking=yes -o IdentitiesOnly=yes -i ~/.ssh/deploy_key)
          REMOTE="${SSH_USER}@${SSH_HOST}"

          echo "Testing SSH connection..."
          ssh "${SSH_OPTS[@]}" "$REMOTE" "echo connected && mkdir -p ${DEPLOY_DIR}dist ${DEPLOY_DIR}resource"

          echo "Uploading frontend..."
          scp "${SSH_OPTS[@]}" -r web/dist/. "${REMOTE}:${DEPLOY_DIR}dist/"

          echo "Uploading backend binary..."
          scp "${SSH_OPTS[@]}" server/server "${REMOTE}:${DEPLOY_DIR}server"

          echo "Uploading backend resource..."
          scp "${SSH_OPTS[@]}" -r server/resource/. "${REMOTE}:${DEPLOY_DIR}resource/"

          echo "Uploading restart script..."
          scp "${SSH_OPTS[@]}" deploy/scripts/restart.sh "${REMOTE}:${DEPLOY_DIR}restart.sh"

          echo "Restarting service..."
          ssh "${SSH_OPTS[@]}" "$REMOTE" "chmod +x ${DEPLOY_DIR}restart.sh ${DEPLOY_DIR}server && cd ${DEPLOY_DIR} && bash restart.sh"

          echo "Deploy success"
